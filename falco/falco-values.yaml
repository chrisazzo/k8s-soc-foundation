driver:
  kind: modern_ebpf

falcosidekick:
  enabled: true
  config:
    slack:
      webhookurl: ""
      minimumpriority: "warning"
    webhook:
      address: "http://falco-ai-explainer.falco.svc:8080/webhook"
      minimumpriority: "warning"
  webui:
    enabled: false

customRules:
  custom-k8s-rules.yaml: |-
    - rule: Cryptominer Binary Execution
      desc: Detects execution of cryptominer binaries
      condition: >
        spawned_process and container and
        (proc.name in (xmrig, minerd, cpuminer, cgminer) or
         proc.cmdline contains "stratum+tcp" or
         proc.cmdline contains "pool.")
      output: >
        Cryptominer execution detected
        (user=%user.name command=%proc.cmdline pid=%proc.pid
         container_id=%container.id image=%container.image.repository
         pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: CRITICAL
      tags: [cryptominer, mitre_impact, T1496]

    - rule: Service Account Token Read
      desc: Detects reading of SA token inside a container
      condition: >
        open_read and container and
        fd.name startswith /var/run/secrets/kubernetes.io/serviceaccount
      output: >
        Service account token read
        (user=%user.name command=%proc.cmdline
         file=%fd.name pod=%k8s.pod.name ns=%k8s.ns.name)
      priority: WARNING
      tags: [mitre_credential_access, T1528]
  