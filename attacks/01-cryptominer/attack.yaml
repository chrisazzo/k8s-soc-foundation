apiVersion: v1
kind: Pod
metadata:
  name: cryptominer-sim
  namespace: default
  labels:
    attack: "01-cryptominer"
    mitre: "T1496"
spec:
  containers:
  - name: miner
    image: alpine:3.18
    command: ["/bin/sh", "-c"]
    args:
      - |
        echo "Simulating cryptominer binary execution..."
        cp /bin/sh /tmp/xmrig
        chmod +x /tmp/xmrig
        /tmp/xmrig -c "stratum+tcp://pool.supportxmr.com:3333" 2>/dev/null || true
        echo "Done"
    resources:
      limits:
        cpu: "100m"
        memory: "64Mi"
